<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Controller PWA</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .status { margin: 20px; padding: 10px; border-radius: 8px; background: #222; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .val { font-size: 24px; font-weight: bold; color: #00ff00; }
        input[type=range] { width: 80%; margin: 20px; }
        .connected { color: #00ff00; }
        .disconnected { color: #ff4444; }
    </style>
</head>
<body>

    <h1>Robot Control</h1>

    <div class="status">
        Bluetooth: <span id="btStatus" class="disconnected">Terputus</span><br>
        Gamepad: <span id="gpStatus" class="disconnected">Tiada PS4 Controller</span>
    </div>

    <button id="connectBtn">Sambung Bluetooth</button>

    <div class="grid">
        <div>
            <p>Joystick Kiri (LY)</p>
            <div id="lyVal" class="val">0</div>
        </div>
        <div>
            <p>Joystick Kanan (RX)</p>
            <div id="rxVal" class="val">0</div>
        </div>
    </div>

    <p>Max Speed (Slider)</p>
    <input type="range" id="speedSlider" min="0" max="255" value="200">
    <div id="speedVal" class="val">200</div>

    <script>
        let device, characteristic;
        let lastLY = 0, lastRX = 0, lastV = 200;

        // --- KONFIGURASI BLUETOOTH ---
        const SERVICE_UUID = 0xFFE0; // Standard untuk HM-10/JDY-31
        const CHAR_UUID = 0xFFE1;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('btStatus').innerText = "Bersambung!";
                document.getElementById('btStatus').className = "connected";
                sendData("V:200\n"); // Hantar speed awal
            } catch (error) {
                console.log("Ralat Bluetooth: " + error);
            }
        });

        async function sendData(data) {
            if (characteristic) {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(data));
            }
        }

        // --- KAWALAN SLIDER ---
        const slider = document.getElementById('speedSlider');
        slider.oninput = function() {
            const val = this.value;
            document.getElementById('speedVal').innerText = val;
            if (val !== lastV) {
                sendData(`V:${val}\n`);
                lastV = val;
            }
        };

        // --- KAWALAN GAMEPAD (PS4) ---
        window.addEventListener("gamepadconnected", (e) => {
            document.getElementById('gpStatus').innerText = "PS4 Terhubung!";
            document.getElementById('gpStatus').className = "connected";
            updateGamepad();
        });

        window.addEventListener("gamepaddisconnected", () => {
            document.getElementById('gpStatus').innerText = "Tiada PS4 Controller";
            document.getElementById('gpStatus').className = "disconnected";
        });

        function updateGamepad() {
            const gamepads = navigator.getGamepads();
            if (!gamepads[0]) return;

            const gp = gamepads[0];
            
            // PS4 Axis: [1] adalah LY (Kiri Up/Down), [2] adalah RX (Kanan Left/Right)
            // Nilai dari Gamepad API adalah -1.0 hingga 1.0. Kita tukar ke -255 ke 255.
            let rawLY = Math.round(gp.axes[1] * -255); // Terbalikkan axis Y supaya atas = positif
            let rawRX = Math.round(gp.axes[2] * 255);

            // Deadzone (abaikan gerakan kecil jika joystick longgar)
            if (Math.abs(rawLY) < 20) rawLY = 0;
            if (Math.abs(rawRX) < 20) rawRX = 0;

            // Hanya hantar data jika nilai berubah untuk kurangkan lag
            if (rawLY !== lastLY) {
                sendData(`LY:${rawLY}\n`);
                document.getElementById('lyVal').innerText = rawLY;
                lastLY = rawLY;
            }
            if (rawRX !== lastRX) {
                sendData(`RX:${rawRX}\n`);
                document.getElementById('rxVal').innerText = rawRX;
                lastRX = rawRX;
            }

            requestAnimationFrame(updateGamepad);
        }
    </script>
</body>
</html>
