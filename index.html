<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MicroJoy URC10</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  margin-top: 20px;
}

button {
  padding: 18px;
  margin: 8px;
  font-size: 20px;
  border-radius: 12px;
  border: none;
  width: 80px;
}

#connect {
  background: #22c55e;
  width: 200px;
}

.control {
  margin-top: 30px;
}

.stop {
  background: red;
  width: 100px;
}
</style>
</head>

<body>

<h1>🤖 MicroJoy URC10</h1>

<button id="connect">🔗 Connect</button>

<div class="control">
  <div>
    <button onclick="send('F')">⬆️</button>
  </div>

  <div>
    <button onclick="send('L')">⬅️</button>
    <button class="stop" onclick="send('S')">STOP</button>
    <button onclick="send('R')">➡️</button>
  </div>

  <div>
    <button onclick="send('B')">⬇️</button>
  </div>
</div>

<script>
let device;
let characteristic;

// 🔥 CONNECT BLUETOOTH
async function connectBluetooth() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['00001101-0000-1000-8000-00805f9b34fb']
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('00001101-0000-1000-8000-00805f9b34fb');
    characteristic = await service.getCharacteristic('00001101-0000-1000-8000-00805f9b34fb');

    alert("✅ Connected to HC-05!");
  } catch (error) {
    alert("❌ Connection failed");
    console.error(error);
  }
}

document.getElementById("connect").addEventListener("click", connectBluetooth);

// 🔥 SEND DATA
async function send(cmd) {
  if (!characteristic) {
    alert("⚠️ Not connected!");
    return;
  }

  const encoder = new TextEncoder();
  await characteristic.writeValue(encoder.encode(cmd));
}
</script>

</body>
</html>
